<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Google</title>
        <link href="styles.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <ul class="navbar-google">
            <li class="navbar-item-google"><a href="index.html">Google</a></li>
        </ul>
        <img src="google.png" height="92" class="icon-adv">
        <div class="line"></div>
        <div class="font1-adv">
            <p>Advanced Search</p>
        </div>
        <div class="font2-adv">
            <p class="p2-adv">Find a site with...</p>
        </div>
        <form action="http:google.com/search">
            <div class="row-input">
                <p class="row-left">all these words:</p>  
                <div class="row-right">
                      <input class="form-control" type="text" name="q">
                </div>
                    
            </div>
             <div class="row-input">
                <p class="row-left">this extract word or phrase:</p>  
                <div class="row-right">
                      <input class="form-control" type="text" name="epq">
                </div>
                    
            </div>
             <div class="row-input">
                <p class="row-left">any of these words:</p>  
                <div class="row-right">
                      <input class="form-control" type="text" name="oq">
                </div>
                    
            </div>
             <div class="row-input">
                <p class="row-left">none of these words:</p>  
                <div class="row-right">
                      <input class="form-control" type="text" name="eq">
                </div>
                    
            </div>
            <div class="btn-div">
                <input class="btn-adv" type="submit" value="Advanced Search">
            </div>
        </form>
    </body>
</html>
